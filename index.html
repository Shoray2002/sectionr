<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sectionr — 3D → plotter SVG</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; background: #141414; color: #e5e7eb; }
    #app { display: flex; height: 100%; }
    #view { flex: 1; position: relative; background: #141414; min-width: 0; }
    #view canvas { display: block; }
    #panel {
      width: 300px; padding: 16px; overflow-y: auto;
      border-left: 1px solid #2a2a2a; background: #1b1b1b; font-size: 13px; color: #e5e7eb;
    }
    #panel h1 { font-size: 15px; margin: 0 0 14px; }
    #panel h2 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin: 20px 0 8px; letter-spacing: .05em; }
    .check { display: flex; align-items: center; gap: 8px; margin: 7px 0; }
    .check input { margin: 0; width: 14px; height: 14px; accent-color: #e5e7eb; }
    .check label { margin: 0; cursor: pointer; }
    button {
      width: 100%; padding: 9px; margin-top: 8px; cursor: pointer;
      border: 1px solid #3a3a3a; border-radius: 6px; background: #262626; color: #e5e7eb; font-size: 13px;
    }
    button:hover { background: #303030; }
    button.primary { background: #f5f5f5; color: #111; border-color: #f5f5f5; }
    button.primary:hover { background: #e5e7eb; }
    button:disabled { opacity: .45; cursor: default; }
    #file { display: none; }
    #status { margin-top: 14px; color: #9ca3af; font-size: 12px; min-height: 16px; }
    .hint { color: #6b7280; font-size: 11px; margin: 4px 0 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="view"></div>
    <div id="panel">
      <h1>sectionr</h1>

      <label for="file" class="primary" style="display:block;text-align:center;border-radius:6px;padding:9px;cursor:pointer;">Upload model</label>
      <input id="file" type="file" accept=".glb,.gltf,.obj,.stl,.stp,.step,.igs,.iges" />
      <p class="hint">GLB / GLTF / OBJ / STL · CAD: STEP / IGES</p>

      <h2>Display</h2>
      <div class="check"><input id="displayModel" type="checkbox" checked><label for="displayModel">Show 3D model</label></div>
      <div class="check"><input id="displayDrawThroughProjection" type="checkbox"><label for="displayDrawThroughProjection">Show hidden edges</label></div>

      <h2>Projection</h2>
      <div class="check"><input id="includeIntersectionEdges" type="checkbox"><label for="includeIntersectionEdges">Include intersection edges</label></div>
      <div class="check"><input id="visibilityCullMeshes" type="checkbox"><label for="visibilityCullMeshes">Visibility cull meshes</label></div>
      <div class="check"><input id="perObjectColors" type="checkbox"><label for="perObjectColors">Per-object colors</label></div>
      <button id="rotate">Random rotate</button>
      <button id="regenerate" class="primary">Regenerate</button>

      <h2>Export</h2>
      <button id="downloadSVG" disabled>Download SVG</button>
      <p class="hint">Longest side scaled to 300&nbsp;mm.</p>

      <div id="output"></div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
