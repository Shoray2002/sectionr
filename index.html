<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sectionr — 3D → plotter SVG</title>
  <style>
    :root { --fg: #1a1a1a; --muted: #6b7280; --line: #e5e7eb; }
    html, body { margin: 0; padding: 0; overflow: hidden; background: #eee; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; }

    /* status text the example writes into */
    #output {
      position: absolute; top: 14px; left: 16px; z-index: 1;
      font-size: 12px; color: var(--muted); letter-spacing: .01em;
      background: rgba(255,255,255,.7); backdrop-filter: blur(4px);
      padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line);
    }

    /* upload button (label wraps a hidden native input) */
    #upload {
      position: absolute; bottom: 16px; left: 16px; z-index: 2;
      display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: #fff; background: var(--fg);
      padding: 9px 14px; border-radius: 8px; border: 1px solid var(--fg);
      box-shadow: 0 1px 2px rgba(0,0,0,.12); user-select: none;
    }
    #upload:hover { background: #000; }
    #upload svg { width: 15px; height: 15px; }
    #file { display: none; }
  </style>
</head>
<body>
  <div id="output"></div>
  <label id="upload">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Upload model
    <input id="file" type="file" accept=".glb,.gltf,.obj,.stl,.stp,.step,.igs,.iges" />
  </label>
  <script type="module" src="/main.js"></script>
</body>
</html>
